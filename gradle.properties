# SemVer format -> https://semver.org
pluginVersion = 0.8.0

# Enable Gradle Build Cache -> https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true
org.gradle.parallel=true

# IMPORTANT: daemon must be enabled for incremental builds / hot-reload to work.
# Without the daemon, prepareSandbox re-executes every time and touches bundled
# plugin JARs in the sandbox, triggering a VFS reload of com.intellij.ml.llm
# (which is not unload-safe) → hot-reload fails.
org.gradle.daemon=true
